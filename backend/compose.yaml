services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: calendar
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: calendar
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar -d calendar"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - calendar-pgdata:/var/lib/postgresql/data
volumes:
  calendar-pgdata:
