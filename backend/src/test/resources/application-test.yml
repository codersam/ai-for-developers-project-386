spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///calendar
    username: calendar
    password: calendar
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  docker:
    compose:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
