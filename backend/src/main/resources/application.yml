server:
  port: ${PORT:8080}

spring:
  application:
    name: calendar-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/calendar
    username: calendar
    password: calendar
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true
  docker:
    compose:
      enabled: true
      lifecycle-management: start-and-stop

owner:
  timezone: Europe/Berlin

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
