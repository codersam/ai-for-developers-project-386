openapi: 3.1.0
info:
  title: Calendar Service
  version: 0.0.0
tags:
  - name: Calendar
paths:
  /calendar/event_types:
    post:
      operationId: CalendarService_createEventType
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventType'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Calendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventType'
    get:
      operationId: CalendarService_listEventTypes
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventType'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Calendar
  /calendar/event_types/{eventTypeId}/available_slots:
    get:
      operationId: CalendarService_listAvailableSlots
      parameters:
        - name: eventTypeId
          in: path
          required: true
          schema:
            type: string
        - name: clientTimeZone
          in: query
          required: true
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailableTimeSlots'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Calendar
  /calendar/scheduled_events:
    get:
      operationId: CalendarService_listScheduledEvents
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduledEvent'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Calendar
    post:
      operationId: CalendarService_createScheduledEvent
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledEvent'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Calendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduledEvent'
components:
  schemas:
    AvailableTimeSlots:
      type: object
      required:
        - slotsPerDay
      properties:
        slotsPerDay:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlotsOfTheDay'
    Calendar:
      type: object
      required:
        - ownerName
        - ownerEmail
        - startOfTheDayHour
        - endOfTheDayHour
        - breaks
        - workingDays
      properties:
        ownerName:
          type: string
        ownerEmail:
          type: string
        startOfTheDayHour:
          type: string
          format: time
        endOfTheDayHour:
          type: string
          format: time
        breaks:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
        workingDays:
          type: array
          items:
            $ref: '#/components/schemas/DayOfWeek'
    CreateScheduledEvent:
      type: object
      required:
        - eventTypeId
        - date
        - time
        - guestName
        - guestEmail
        - guestTimezone
      properties:
        eventTypeId:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
          format: time
        guestName:
          type: string
        guestEmail:
          type: string
        guestTimezone:
          type: string
    DayOfWeek:
      type: string
      enum:
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
        - Saturday
        - Sunday
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
    EventType:
      type: object
      required:
        - eventTypeId
        - eventTypeName
        - description
        - durationMinutes
      properties:
        eventTypeId:
          type: string
          readOnly: true
        eventTypeName:
          type: string
        description:
          type: string
        durationMinutes:
          type: integer
          format: int32
    ScheduledEvent:
      type: object
      required:
        - scheduledEventId
        - eventTypeId
        - utcDateStart
        - durationMinutes
        - guestName
        - guestEmail
        - guestTimezone
      properties:
        scheduledEventId:
          type: string
          readOnly: true
        eventTypeId:
          type: string
        utcDateStart:
          type: string
          format: date-time
        durationMinutes:
          type: integer
          format: int32
        guestName:
          type: string
        guestEmail:
          type: string
        guestTimezone:
          type: string
    TimeSlot:
      type: object
      required:
        - timeStart
        - duration
      properties:
        timeStart:
          type: string
          format: time
        duration:
          type: integer
          format: int32
    TimeSlotsOfTheDay:
      type: object
      required:
        - date
        - timeSlots
      properties:
        date:
          type: string
          format: date
        timeSlots:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
